<section>
  <h2>Job Matching</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>Job title</label>
    <input formControlName="job_title" />

    <label>Required skills (comma separated)</label>
    <input formControlName="required_skills" />

    <label>Min experience</label>
    <input type="number" formControlName="min_experience" />

    <label>Limit</label>
    <input type="number" formControlName="limit" />

    <button type="submit" [disabled]="loading">Run match</button>
  </form>

  <p *ngIf="loading">Matching...</p>
  <p *ngIf="error">{{ error }}</p>

  <table *ngIf="results.length">
    <thead>
      <tr>
        <th>Name</th>
        <th>Score %</th>
        <th>Predicted Title</th>
        <th>Experience (years)</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of results">
        <td>{{ c.full_name || c.employee_id }}</td>
        <td>{{ c.score_percent ?? ((c.score ?? 0) * 100) | number:'1.0-2' }}</td>
        <td>{{ c.predicted_title || 'N/A' }}</td>
        <td>{{ c.predicted_experience_years ?? 'N/A' }}</td>
      </tr>
    </tbody>
  </table>
</section>
