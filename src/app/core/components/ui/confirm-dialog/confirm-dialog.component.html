<div
  *ngIf="open"
  data-backdrop="true"
  class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/55 p-4"
  (click)="onBackdropClick($event)"
>
  <section
    class="w-full max-w-md rounded-xl border border-gray-200 bg-white p-5 shadow-2xl"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="titleKey ? (titleKey | t) : title"
  >
    <h3 class="text-lg font-semibold text-gray-900">
      {{ titleKey ? (titleKey | t) : title }}
    </h3>
    <p *ngIf="messageKey || message" class="mt-2 text-sm text-gray-600">
      {{ messageKey ? (messageKey | t) : message }}
    </p>

    <div class="mt-5 flex justify-end gap-2">
      <button type="button" class="btn-secondary" (click)="cancel.emit()">
        {{ cancelLabelKey | t }}
      </button>
      <button
        type="button"
        class="btn-primary"
        [ngClass]="danger ? 'bg-red-600 hover:bg-red-700 focus:ring-red-500' : ''"
        (click)="confirm.emit()"
      >
        {{ confirmLabelKey | t }}
      </button>
    </div>
  </section>
</div>
