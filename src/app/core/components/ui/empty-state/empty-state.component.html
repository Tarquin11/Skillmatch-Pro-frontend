<div class="rounded-xl border border-dashed border-gray-300 bg-gray-50/80 p-6 text-center">
  <p class="text-base font-semibold text-gray-800">
    {{ titleKey ? (titleKey | t) : title }}
  </p>
  <p *ngIf="subtitleKey || subtitle" class="mt-1 text-sm text-gray-600">
    {{ subtitleKey ? (subtitleKey | t) : subtitle }}
  </p>
  <div class="mt-4">
    <ng-content></ng-content>
  </div>
</div>
