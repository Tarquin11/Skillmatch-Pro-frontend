<div class="layout">
  <header class="topbar">
    <h1>{{ 'app.title' | t }}</h1>
    <nav>
      <button
        type="button"
        class="lang-btn"
        [class.active]="currentLanguage() === 'fr'"
        (click)="setLanguage('fr')"
      >
        FR
      </button>
      <button
        type="button"
        class="lang-btn"
        [class.active]="currentLanguage() === 'en'"
        (click)="setLanguage('en')"
      >
        EN
      </button>

      <a *ngIf="isAuthenticated()" routerLink="/dashboard" routerLinkActive="active">{{ 'nav.dashboard' | t }}</a>
      <a *ngIf="isAuthenticated()" routerLink="/matching" routerLinkActive="active">{{ 'nav.matching' | t }}</a>
      <a *ngIf="isAuthenticated()" routerLink="/cv-upload" routerLinkActive="active">{{ 'nav.cvUpload' | t }}</a>
      <a *ngIf="isAuthenticated() && isAdmin()" routerLink="/admin/users" routerLinkActive="active">{{ 'nav.adminUsers' | t }}</a>
      <a *ngIf="!isAuthenticated()" routerLink="/login" routerLinkActive="active">{{ 'nav.login' | t }}</a>
      <button *ngIf="isAuthenticated()" class="logout-btn" type="button" (click)="logout()">{{ 'nav.logout' | t }}</button>
    </nav>
  </header>

  <main class="content">
    <div *ngIf="authLoading$ | async" class="route-loading">
      {{ 'common.loading' | t }}
    </div>
    <router-outlet></router-outlet>
  </main>
</div>
