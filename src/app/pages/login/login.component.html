<section class="max-w-md mx-auto" aria-labelledby="login-title">
  <div class="card p-6 md:p-8">
    <h2 id="login-title" class="text-2xl font-semibold mb-2">{{ 'login.title' | t }}</h2>
    <p class="text-sm text-gray-600 mb-6">{{ 'login.subtitle' | t }}</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4" novalidate>
      <div>
        <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1">{{ 'login.email' | t }}</label>
        <input
          id="login-email"
          type="email"
          formControlName="email"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500"
          placeholder="you@example.com"
          autocomplete="email"
          [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched ? 'true' : 'false'"
        />
      </div>

      <div>
        <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">{{ 'login.password' | t }}</label>
        <input
          id="login-password"
          type="password"
          formControlName="password"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500"
          placeholder="********"
          autocomplete="current-password"
          [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched ? 'true' : 'false'"
        />
      </div>

      <label for="login-remember-me" class="inline-flex items-center gap-2 text-sm text-gray-700 select-none">
        <input
          id="login-remember-me"
          type="checkbox"
          formControlName="remember_me"
          class="h-4 w-4 rounded border border-gray-300 text-primary-600 focus:ring-primary-500"
        />
        <span>{{ 'login.remember_me' | t }}</span>
      </label>

      <button class="btn-primary w-full" type="submit" [disabled]="loading">
        {{ loading ? ('login.submitting' | t) : ('login.submit' | t) }}
      </button>
    </form>

    <p *ngIf="errorKey" class="mt-4 text-sm text-red-600" role="alert" aria-live="assertive">{{ errorKey | t }}</p>
  </div>
</section>
