<section class="max-w-md mx-auto">
  <div class="card p-6 md:p-8">
    <h2 class="text-2xl font-semibold mb-2">{{ 'login.title' | t }}</h2>
    <p class="text-sm text-gray-600 mb-6">{{ 'login.subtitle' | t }}</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'login.email' | t }}</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'login.password' | t }}</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500"
          placeholder="********"
        />
      </div>

      <button class="btn-primary w-full" type="submit" [disabled]="loading">
        {{ loading ? ('login.submitting' | t) : ('login.submit' | t) }}
      </button>
    </form>

    <p *ngIf="errorKey" class="mt-4 text-sm text-red-600">{{ errorKey | t }}</p>
  </div>
</section>
